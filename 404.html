<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Page introuvable – JobBoard Bilingue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Erreur 404 – La page demandée est introuvable sur le JobBoard bilingue FR/EN." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family:'Inter',sans-serif; background:#F5F7FA; margin:0; display:flex; flex-direction:column; height:100vh; }
    header, footer { background:#fff; border-bottom:1px solid #E5E7EB; }
    .container { max-width:1120px; margin:auto; padding:0 16px; }
    .header-inner { display:flex; justify-content:space-between; align-items:center; padding:14px 0; }
    .logo { display:flex; align-items:center; gap:8px; font-weight:700; color:#1F3C88; }
    .logo-mark { width:28px; height:28px; background:linear-gradient(135deg,#1F3C88,#4F8FF7); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; }
    nav a { margin-right:20px; color:#6B7280; font-size:14px; text-decoration:none; }
    nav a:hover { color:#1F3C88; }
    .lang-switch button { padding:6px 10px; border:none; cursor:pointer; }
    .lang-switch .active { background:#1F3C88; color:#fff; border-radius:999px; }

    main { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 16px; }
    h1 { font-size:48px; color:#1F3C88; margin-bottom:16px; }
    p { color:#6B7280; font-size:16px; margin-bottom:24px; }

    .btn-primary {
      background:#2BB673; color:#fff; padding:12px 20px;
      border-radius:999px; text-decoration:none; font-weight:600;
      display:inline-block; border:none; cursor:pointer;
    }
    .btn-primary:hover { background:#23945f; }

    footer { padding:20px 0; border-top:1px solid #E5E7EB; font-size:13px; color:#6B7280; }
  </style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <div class="logo-mark">JB</div>
      <span>JobBoard</span>
    </div>

    <nav>
      <a href="index.html" data-i18n="nav.home">Accueil</a>
      <a href="jobs.html" data-i18n="nav.jobs">Offres</a>
      <a href="categories.html" data-i18n="nav.categories">Catégories</a>
      <a href="about.html" data-i18n="nav.about">À propos</a>
      <a href="contact.html" data-i18n="nav.contact">Contact</a>
    </nav>

    <div class="lang-switch">
      <button id="btn-fr" class="active">FR</button>
      <button id="btn-en">EN</button>
    </div>
  </div>
</header>

<main>
  <div>
    <h1 data-i18n="404.title">404</h1>
    <p data-i18n="404.text">La page que vous recherchez est introuvable.</p>
    <a href="index.html" class="btn-primary" data-i18n="404.button">Retour à l’accueil</a>
  </div>
</main>

<footer>
  <div class="container">
    © <span id="year"></span> JobBoard — <span data-i18n="footer.rights">Tous droits réservés.</span>
  </div>
</footer>

<script>
  const translations = {
    fr: {
      "nav.home": "Accueil",
      "nav.jobs": "Offres",
      "nav.categories": "Catégories",
      "nav.about": "À propos",
      "nav.contact": "Contact",

      "404.title": "404",
      "404.text": "La page que vous recherchez est introuvable.",
      "404.button": "Retour à l’accueil",

      "footer.rights": "Tous droits réservés."
    },

    en: {
      "nav.home": "Home",
      "nav.jobs": "Jobs",
      "nav.categories": "Categories",
      "nav.about": "About",
      "nav.contact": "Contact",

      "404.title": "404",
      "404.text": "The page you are looking for cannot be found.",
      "404.button": "Back to home",

      "footer.rights": "All rights reserved."
    }
  };

  function applyTranslations(lang) {
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      el.textContent = translations[lang][key];
    });
  }

  document.getElementById("btn-fr").onclick = () => {
    applyTranslations("fr");
    localStorage.setItem("lang", "fr");
    document.getElementById("btn-fr").classList.add("active");
    document.getElementById("btn-en").classList.remove("active");
  };

  document.getElementById("btn-en").onclick = () => {
    applyTranslations("en");
    localStorage.setItem("lang", "en");
    document.getElementById("btn-en").classList.add("active");
    document.getElementById("btn-fr").classList.remove("active");
  };

  const saved = localStorage.getItem("lang") || "fr";
  applyTranslations(saved);
  document.getElementById("btn-" + saved).classList.add("active");

  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
