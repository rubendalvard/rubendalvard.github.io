<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Contact – Rubén D'ALVARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <meta name="description" content="Contactez Rubén D'ALVARD pour toute opportunité professionnelle, collaboration ou information.">

  <!-- Open Graph -->
  <meta property="og:title" content="Contact – Rubén D'ALVARD">
  <meta property="og:description" content="Responsable des Opérations, Service Client et Business Developer.">
  <meta property="og:image" content="photo.jpg">
  <meta property="og:type" content="website">

  <!-- Hreflang -->
  <link rel="alternate" hreflang="fr" href="contact.html">
  <link rel="alternate" hreflang="en" href="contact.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1F3C88;
      --accent: #2BB673;
      --bg: #F5F7FA;
      --text-main: #1A1A1A;
      --text-muted: #6B7280;
      --border: #E5E7EB;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 0 16px;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
    }

    nav a {
      margin-right: 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: var(--primary);
    }

    .lang-switch button {
      padding: 6px 10px;
      border: none;
      cursor: pointer;
    }

    .lang-switch .active {
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
    }

    /* CONTACT PAGE */
    .contact {
      text-align: center;
      padding: 60px 0;
    }

    h1 {
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .contact-box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .contact-box p {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      margin-top: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    footer {
      padding: 20px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <strong style="color:var(--primary);">Rubén D'ALVARD</strong>
    </div>

    <nav>
      <a href="index.html" data-i18n="nav.home">Accueil</a>
      <a href="about.html" data-i18n="nav.about">À propos</a>
      <a href="cv.html" data-i18n="nav.cv">Mes CV</a>
      <a href="contact.html" data-i18n="nav.contact">Contact</a>
    </nav>

    <div class="lang-switch">
      <button id="btn-fr" class="active">FR</button>
      <button id="btn-en">EN</button>
    </div>
  </div>
</header>

<main class="container">
  <section class="contact">

    <h1 data-i18n="contact.title">Me contacter</h1>
    <h2 data-i18n="contact.subtitle">Pour toute opportunité professionnelle ou collaboration</h2>

    <div class="contact-box">
      <p data-i18n="contact.text">
        Vous pouvez me contacter directement par email. Je réponds rapidement et avec plaisir.
      </p>

      <a href="mailto:rubendalvard@gmail.com" class="btn btn-primary" data-i18n="contact.btnEmail">
        Envoyer un email
      </a>
    </div>

  </section>
</main>

<footer>
  © <span id="year"></span> Rubén D'ALVARD — <span data-i18n="footer.rights">Tous droits réservés.</span>
</footer>

<script>
  const translations = {
    fr: {
      "nav.home": "Accueil",
      "nav.about": "À propos",
      "nav.cv": "Mes CV",
      "nav.contact": "Contact",

      "contact.title": "Me contacter",
      "contact.subtitle": "Pour toute opportunité professionnelle ou collaboration",
      "contact.text": "Vous pouvez me contacter directement par email. Je réponds rapidement et avec plaisir.",
      "contact.btnEmail": "Envoyer un email",

      "footer.rights": "Tous droits réservés."
    },

    en: {
      "nav.home": "Home",
      "nav.about": "About",
      "nav.cv": "My CVs",
      "nav.contact": "Contact",

      "contact.title": "Contact Me",
      "contact.subtitle": "For any professional opportunity or collaboration",
      "contact.text": "You can contact me directly by email. I usually reply quickly.",
      "contact.btnEmail": "Send an email",

      "footer.rights": "All rights reserved."
    }
  };

  function applyTranslations(lang) {
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      el.textContent = translations[lang][key];
    });
  }

  document.getElementById("btn-fr").onclick = () => {
    applyTranslations("fr");
    localStorage.setItem("lang", "fr");
  };

  document.getElementById("btn-en").onclick = () => {
    applyTranslations("en");
    localStorage.setItem("lang", "en");
  };

  const saved = localStorage.getItem("lang") || "fr";
  applyTranslations(saved);

  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
