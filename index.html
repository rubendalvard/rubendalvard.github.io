<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rubén D'ALVARD – Responsable des Opérations | Service Client | Business Developer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Site professionnel de Rubén D'ALVARD – Responsable des Opérations, Service Client et Business Developer. CV bilingues FR/EN, parcours, compétences et contact." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1F3C88;
      --accent: #2BB673;
      --bg: #F5F7FA;
      --text-main: #1A1A1A;
      --text-muted: #6B7280;
      --border: #E5E7EB;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
    }

    .container {
      max-width: 1120px;
      margin: auto;
      padding: 0 16px;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: var(--primary);
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--primary), #4F8FF7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    nav a {
      margin-right: 20px;
      color: var(--text-muted);
      font-size: 14px;
      text-decoration: none;
    }

    nav a:hover {
      color: var(--primary);
    }

    .lang-switch button {
      padding: 6px 10px;
      border: none;
      cursor: pointer;
    }

    .lang-switch .active {
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
    }

    /* HERO MINIMALISTE */
    .hero {
      text-align: center;
      padding: 80px 16px;
    }

    .hero img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary);
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .hero h2 {
      font-size: 20px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      margin: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-outline {
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    footer {
      padding: 20px 0;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <div class="logo-mark">RD</div>
      <span>Rubén D'ALVARD</span>
    </div>

    <nav>
      <a href="index.html" data-i18n="nav.home">Accueil</a>
      <a href="about.html" data-i18n="nav.about">À propos</a>
      <a href="cv.html" data-i18n="nav.cv">Mes CV</a>
      <a href="contact.html" data-i18n="nav.contact">Contact</a>
    </nav>

    <div class="lang-switch">
      <button id="btn-fr" class="active">FR</button>
      <button id="btn-en">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">

    <!-- ⭐⭐⭐ TA PHOTO ⭐⭐⭐ -->
    <img src="photo.jpg" alt="Photo de profil">

    <h1 data-i18n="hero.name">Rubén D'ALVARD</h1>
    <h2 data-i18n="hero.title">Responsable des Opérations · Service Client · Business Developer</h2>

    <!-- ⭐⭐⭐ BOUTONS CV FR + EN ⭐⭐⭐ -->
    <a href="cv-fr.pdf" class="btn btn-primary" download data-i18n="hero.btnCVfr">Télécharger CV Français</a>
    <a href="cv-en.pdf" class="btn btn-outline" download data-i18n="hero.btnCVen">Download English CV</a>

    <br>

    <a href="about.html" class="btn btn-outline" data-i18n="hero.btnAbout">En savoir plus</a>

  </section>
</main>

<footer>
  © <span id="year"></span> Rubén D'ALVARD — <span data-i18n="footer.rights">Tous droits réservés.</span>
</footer>

<script>
  const translations = {
    fr: {
      "nav.home": "Accueil",
      "nav.about": "À propos",
      "nav.cv": "Mes CV",
      "nav.contact": "Contact",

      "hero.name": "Rubén D'ALVARD",
      "hero.title": "Responsable des Opérations · Service Client · Business Developer",
      "hero.btnCVfr": "Télécharger CV Français",
      "hero.btnCVen": "Télécharger CV Anglais",
      "hero.btnAbout": "En savoir plus",

      "footer.rights": "Tous droits réservés."
    },

    en: {
      "nav.home": "Home",
      "nav.about": "About",
      "nav.cv": "My CVs",
      "nav.contact": "Contact",

      "hero.name": "Rubén D'ALVARD",
      "hero.title": "Operations Manager · Customer Service Lead · Business Developer",
      "hero.btnCVfr": "Download French CV",
      "hero.btnCVen": "Download English CV",
      "hero.btnAbout": "Learn more",

      "footer.rights": "All rights reserved."
    }
  };

  function applyTranslations(lang) {
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      el.textContent = translations[lang][key];
    });
  }

  document.getElementById("btn-fr").onclick = () => {
    applyTranslations("fr");
    localStorage.setItem("lang", "fr");
  };

  document.getElementById("btn-en").onclick = () => {
    applyTranslations("en");
    localStorage.setItem("lang", "en");
  };

  const saved = localStorage.getItem("lang") || "fr";
  applyTranslations(saved);

  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
