<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Offres d’emploi – JobBoard Bilingue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Découvrez toutes les offres d’emploi disponibles sur notre JobBoard bilingue FR/EN." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* --- Même CSS que index.html (raccourci ici pour lisibilité) --- */
    body { font-family: 'Inter', sans-serif; background:#F5F7FA; margin:0; }
    header, footer { background:#fff; border-bottom:1px solid #E5E7EB; }
    .container { max-width:1120px; margin:auto; padding:0 16px; }
    .header-inner { display:flex; justify-content:space-between; align-items:center; padding:14px 0; }
    .logo { display:flex; align-items:center; gap:8px; font-weight:700; color:#1F3C88; }
    .logo-mark { width:28px; height:28px; background:linear-gradient(135deg,#1F3C88,#4F8FF7); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; }
    nav a { margin-right:20px; color:#6B7280; font-size:14px; text-decoration:none; }
    nav a:hover { color:#1F3C88; }
    .lang-switch button { padding:6px 10px; border:none; cursor:pointer; }
    .lang-switch .active { background:#1F3C88; color:#fff; border-radius:999px; }
    h1 { font-size:32px; color:#1F3C88; margin-top:32px; }
    .job-list { margin-top:24px; display:grid; gap:16px; }
    .job-card { background:#fff; padding:16px; border-radius:12px; border:1px solid #E5E7EB; }
    .job-title { font-size:18px; font-weight:600; }
    .job-company { font-size:14px; color:#6B7280; }
    .badge { padding:4px 8px; border-radius:999px; background:#F3F4F6; font-size:12px; margin-right:6px; }
    .badge-remote { background:#ECFDF5; color:#047857; }
    .job-footer { display:flex; justify-content:space-between; margin-top:12px; }
    .job-link { color:#1F3C88; font-weight:600; font-size:14px; text-decoration:none; }
    .job-link:hover { color:#4F8FF7; }
    footer { padding:20px 0; margin-top:40px; border-top:1px solid #E5E7EB; font-size:13px; color:#6B7280; }
  </style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <div class="logo-mark">JB</div>
      <span>JobBoard</span>
    </div>

    <nav>
      <a href="index.html" data-i18n="nav.home">Accueil</a>
      <a href="jobs.html" data-i18n="nav.jobs">Offres</a>
      <a href="categories.html" data-i18n="nav.categories">Catégories</a>
      <a href="about.html" data-i18n="nav.about">À propos</a>
    </nav>

    <div class="lang-switch">
      <button id="btn-fr" class="active">FR</button>
      <button id="btn-en">EN</button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <h1 data-i18n="jobs.title">Toutes les offres d’emploi</h1>
    <p data-i18n="jobs.subtitle">Découvrez les opportunités disponibles et filtrez selon vos critères.</p>

    <div class="job-list">

      <!-- Job 1 -->
      <div class="job-card">
        <div class="job-title" data-i18n="jobs.job1.title">Product Manager SaaS</div>
        <div class="job-company" data-i18n="jobs.job1.company">ScaleUp Tech · Paris</div>
        <div>
          <span class="badge" data-i18n="jobs.job1.contract">CDI</span>
          <span class="badge badge-remote" data-i18n="jobs.job1.remote">Remote possible</span>
        </div>
        <div class="job-footer">
          <span data-i18n="jobs.job1.location">Paris · Hybrid</span>
